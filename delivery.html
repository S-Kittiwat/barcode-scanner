<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DocScan — ทีมจัดส่ง</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#263348;--border:#334155;--accent:#38bdf8;--success:#34d399;--warn:#fbbf24;--danger:#f87171;--text:#f1f5f9;--muted:#94a3b8;--font:'IBM Plex Sans Thai',sans-serif;--mono:'IBM Plex Mono',monospace;--r:12px;--rs:8px;--sidebar:240px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:15px;}
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;}
.sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;background:var(--warn);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-name{font-size:14px;font-weight:600;}
.brand-sub{font-size:10px;color:var(--muted);}
.sidebar-user{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface2);}
.user-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:11px;color:var(--warn);margin-top:2px;}
.sidebar-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:4px;}
.nav-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;padding:8px 8px 4px;font-weight:500;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;text-decoration:none;color:var(--muted);font-size:13px;font-weight:500;transition:background 0.15s,color 0.15s;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:rgba(251,191,36,0.1);color:var(--warn);border:1px solid rgba(251,191,36,0.2);}
.nav-icon{font-size:16px;flex-shrink:0;}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border);}
.logout-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;color:var(--muted);font-size:13px;background:none;border:none;width:100%;font-family:var(--font);transition:color 0.15s,background 0.15s;}
.logout-btn:hover{color:var(--danger);background:rgba(248,113,113,0.08);}
.page-wrap{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:600;}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.content{padding:24px;flex:1;}
/* pipeline summary */
.pipeline-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.pipe-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;position:relative;overflow:hidden;}
.pipe-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.pipe-card.p1::before{background:var(--muted);}
.pipe-card.p2::before{background:var(--warn);}
.pipe-card.p3::before{background:var(--accent);}
.pipe-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.pipe-value{font-size:28px;font-weight:700;font-family:var(--mono);}
.pipe-card.p1 .pipe-value{color:var(--muted);}
.pipe-card.p2 .pipe-value{color:var(--warn);}
.pipe-card.p3 .pipe-value{color:var(--accent);}
/* scan section */
.scan-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;}
.scan-card-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.scan-card-head span{font-size:13px;font-weight:500;color:var(--muted);}
.scan-btn{background:var(--warn);color:#0f172a;border:none;border-radius:var(--rs);padding:7px 16px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;}
.scan-btn.stop{background:var(--danger);color:#fff;}
#reader video{width:100% !important;height:auto !important;}
.manual-row{display:flex;gap:8px;padding:12px 16px;}
.manual-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--mono);font-size:14px;padding:9px 12px;outline:none;transition:border-color 0.15s;}
.manual-input:focus{border-color:var(--warn);}
.manual-input::placeholder{color:var(--muted);font-family:var(--font);}
.search-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:9px 16px;font-family:var(--font);font-size:13px;cursor:pointer;}
/* result */
.result-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px;display:none;}
.result-panel.visible{display:block;}
.result-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.doc-badge{background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);color:var(--warn);font-family:var(--mono);font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;}
.fields-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);}
.field-cell{background:var(--surface);padding:12px 16px;}
.field-cell.full{grid-column:1/-1;}
.field-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.field-value{font-size:13px;color:var(--text);}
.field-value.mono{font-family:var(--mono);}
.add-btn{width:100%;background:var(--warn);border:none;color:#0f172a;border-radius:var(--rs);padding:11px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;margin:16px 0 0;}
/* queue */
.queue-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.queue-title{font-size:13px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:8px;}
.queue-count{background:var(--warn);color:#0f172a;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
.clear-btn{font-size:12px;color:var(--danger);background:none;border:none;font-family:var(--font);cursor:pointer;padding:4px 8px;}
.queue-list{display:flex;flex-direction:column;gap:8px;}
.queue-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;gap:12px;}
.queue-num{width:24px;height:24px;background:var(--surface2);border-radius:6px;font-size:11px;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.queue-info{flex:1;min-width:0;}
.queue-barcode{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--warn);}
.queue-details{font-size:12px;color:var(--muted);margin-top:2px;}
.queue-remove{background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.35);color:var(--danger);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:6px;}
/* submit */
.submit-bar{position:fixed;bottom:0;left:var(--sidebar);right:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 24px;display:flex;gap:12px;}
.submit-btn{flex:1;background:var(--warn);border:none;color:#0f172a;border-radius:var(--rs);padding:13px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;}
.submit-btn:disabled{opacity:0.35;cursor:not-allowed;}
.send-btn{background:var(--accent);border:none;color:#0f172a;border-radius:var(--rs);padding:13px 20px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.send-btn:disabled{opacity:0.35;cursor:not-allowed;}
.empty{text-align:center;padding:32px;color:var(--muted);font-size:13px;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 20px;font-size:13px;transition:transform 0.3s;z-index:300;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{border-color:rgba(52,211,153,0.4);color:var(--success);}
.toast.error{border-color:rgba(248,113,113,0.4);color:var(--danger);}
.toast.info{border-color:rgba(56,189,248,0.4);color:var(--accent);}
.spinner{width:16px;height:16px;border:2px solid rgba(251,191,36,0.3);border-top-color:var(--warn);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:640px){.pipeline-grid{grid-template-columns:1fr;}body{font-size:14px;}}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5">
        <rect x="3" y="4" width="3" height="16" rx="1"/><rect x="8" y="4" width="1.5" height="16" rx="0.5"/>
        <rect x="11" y="4" width="3" height="16" rx="1"/><rect x="16" y="4" width="1.5" height="16" rx="0.5"/>
        <rect x="19" y="4" width="2" height="16" rx="1"/>
      </svg>
    </div>
    <div><div class="brand-name">DocScan</div><div class="brand-sub">ทีมจัดส่ง</div></div>
  </div>
  <div class="sidebar-user">
    <div class="user-name" id="sidebarName">—</div>
    <div class="user-role">🚚 ทีมจัดส่ง</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">เมนู</div>
    <a class="nav-item active" href="delivery.html"><span class="nav-icon">📥</span> รับเอกสาร</a>
  </nav>
  <div class="sidebar-footer">
    <button class="logout-btn" onclick="DocScanAuth.clear();location.href='login.html';">↩ ออกจากระบบ</button>
  </div>
</aside>

<div class="page-wrap">
  <div class="topbar">
    <div>
      <div class="topbar-title">รับเอกสารจากขนส่ง</div>
      <div class="topbar-sub" id="topbarSub">—</div>
    </div>
    <div class="spinner" id="loadSpinner" style="display:none;"></div>
  </div>

  <div class="content">
    <!-- Pipeline Summary -->
    <div class="pipeline-grid">
      <div class="pipe-card p1">
        <div class="pipe-label">กับขนส่ง (ยังไม่กลับ)</div>
        <div class="pipe-value" id="pipeTransporter">—</div>
      </div>
      <div class="pipe-card p2">
        <div class="pipe-label">ทีมจัดส่งได้รับแล้ว</div>
        <div class="pipe-value" id="pipeDelivery">—</div>
      </div>
      <div class="pipe-card p3">
        <div class="pipe-label">ส่งให้คลังพาเลทแล้ว</div>
        <div class="pipe-value" id="pipeWarehouse">—</div>
      </div>
    </div>

    <!-- Scan Box -->
    <div class="scan-card">
      <div class="scan-card-head">
        <span>สแกน Barcode เอกสาร</span>
        <button class="scan-btn" id="scanBtn" onclick="toggleScanner()">เปิดกล้อง</button>
      </div>
      <div id="reader" style="display:none;width:100%;"></div>
      <div class="manual-row">
        <input class="manual-input" id="manualInput" type="text" placeholder="พิมพ์ barcode หรือสแกนด้วยเครื่องอ่าน..."
          onkeydown="if(event.key==='Enter') searchBarcode()">
        <button class="search-btn" onclick="searchBarcode()">ค้นหา</button>
      </div>
    </div>

    <!-- Result Panel -->
    <div class="result-panel" id="resultPanel">
      <div class="result-head">
        <div class="doc-badge" id="rBarcode">—</div>
        <span id="rStatus" style="font-size:12px;color:var(--muted);"></span>
      </div>
      <div class="fields-grid">
        <div class="field-cell"><div class="field-label">Reference No.</div><div class="field-value mono" id="fRefNo">—</div></div>
        <div class="field-cell"><div class="field-label">ประเภท</div><div class="field-value" id="fItemName">—</div></div>
        <div class="field-cell"><div class="field-label">โอนจาก</div><div class="field-value" id="fFrom">—</div></div>
        <div class="field-cell"><div class="field-label">โอนไป</div><div class="field-value" id="fTo">—</div></div>
        <div class="field-cell full"><div class="field-label">ยอดที่ส่ง (QTY)</div><div class="field-value mono" id="fQty">—</div></div>
      </div>
      <div style="padding:0 16px 16px;">
        <button class="add-btn" id="addBtn" onclick="addToQueue()">+ เพิ่มลงรายการรับ</button>
      </div>
    </div>

    <!-- Queue -->
    <div class="queue-header">
      <span class="queue-title">รายการรอยืนยัน <span class="queue-count" id="queueCount">0</span></span>
      <button class="clear-btn" onclick="clearQueue()">ล้างทั้งหมด</button>
    </div>
    <div class="queue-list" id="queueList">
      <div class="empty">ยังไม่มีรายการ — สแกน barcode เพื่อเริ่มต้น</div>
    </div>
  </div>
</div>

<!-- Submit Bar -->
<div class="submit-bar">
  <button class="submit-btn" id="submitBtn" onclick="submitReceive()" disabled>
    ✅ ยืนยันรับ 0 รายการ (with_delivery)
  </button>
  <button class="send-btn" id="sendBtn" onclick="sendToWarehouse()" disabled>
    📦 ส่งให้คลังพาเลท
  </button>
</div>

<div id="toast" class="toast"></div>

<script>
// ── Auth ──────────────────────────────────────────────────
var DocScanAuth = (function(){
  var KEY='docScanSession';
  function save(e,n,m,s,r){localStorage.setItem(KEY,JSON.stringify({empId:e,empName:n,empEmail:m,site:s,role:r}));}
  function load(){try{var r=localStorage.getItem(KEY);if(!r)return null;var s=JSON.parse(r);return(s.empId&&s.empName&&s.site)?s:null;}catch(e){return null;}}
  function clear(){localStorage.removeItem(KEY);}
  function requireAuth(){var s=load();if(!s){window.location.href='login.html';return null;}return s;}
  return{save:save,load:load,clear:clear,requireAuth:requireAuth};
})();

var API_URL = 'https://script.google.com/macros/s/AKfycbxC9McrREv4mQ6Mg_309xhlm7imr83boaIoH7Z3oaivwlOQP1tQWHcnHOinY9s41ER-/exec';
var CSV_URL = API_URL + '?action=getCSV';
var session, csvData = [], csvLoaded = false;
var queue = [], currentDoc = null, scanning = false, codeReader = null;

window.onload = function() {
  session = DocScanAuth.requireAuth();
  if (!session) return;
  // ถ้า role ไม่ใช่ delivery ให้ redirect
  if (session.role && session.role !== 'delivery') {
    window.location.href = 'dashboard.html'; return;
  }
  document.getElementById('sidebarName').textContent = session.empName + ' (' + session.empId + ')';
  document.getElementById('topbarSub').textContent   = session.site;
  loadCSV();
  loadPipeline();
};

function loadCSV() {
  fetch(CSV_URL, {method:'GET',redirect:'follow'})
    .then(function(r){return r.text();})
    .then(function(text){csvData=parseCSV(text);csvLoaded=true;})
    .catch(function(){showToast('โหลด CSV ไม่สำเร็จ','error');});
}

function parseCSV(text) {
  var lines=text.replace(/\r/g,'').split('\n').filter(function(l){return l.trim();});
  if(lines.length<2)return[];
  var headers=lines[0].replace(/^\uFEFF/,'').split(',');var rows=[];
  for(var i=1;i<lines.length;i++){var v=lines[i].split(',');var o={};headers.forEach(function(h,idx){o[h.trim()]=(v[idx]||'').trim();});rows.push(o);}
  return rows;
}

function loadPipeline() {
  fetch(API_URL+'?action=getDelivery&site='+encodeURIComponent(session.site))
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.status!=='ok')return;
      var s=data.summary||{};
      document.getElementById('pipeTransporter').textContent = s.with_transporter||0;
      document.getElementById('pipeDelivery').textContent    = s.with_delivery||0;
      document.getElementById('pipeWarehouse').textContent   = s.with_warehouse||0;
    }).catch(function(){});
}

// ── Scanner ──────────────────────────────────────────────
function toggleScanner(){ scanning ? stopScanner() : startScanner(); }
function startScanner(){
  document.getElementById('reader').style.display='block';
  codeReader=new Html5Qrcode('reader');
  codeReader.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:150}},
    function(decoded){stopScanner();document.getElementById('manualInput').value=decoded;fetchDoc(decoded);},
    function(){}
  ).then(function(){
    scanning=true;var b=document.getElementById('scanBtn');b.textContent='หยุดกล้อง';b.classList.add('stop');
  }).catch(function(err){document.getElementById('reader').style.display='none';showToast('เปิดกล้องไม่ได้: '+err,'error');});
}
function stopScanner(){
  if(codeReader){codeReader.stop().then(function(){codeReader.clear();codeReader=null;}).catch(function(){codeReader=null;});}
  document.getElementById('reader').style.display='none';scanning=false;
  var b=document.getElementById('scanBtn');b.textContent='เปิดกล้อง';b.classList.remove('stop');
}
function searchBarcode(){var v=document.getElementById('manualInput').value.trim();if(v)fetchDoc(v);}

function fetchDoc(barcode) {
  if(!csvLoaded){showToast('กำลังโหลดข้อมูล กรุณารอ...','info');return;}
  barcode=barcode.trim().toUpperCase();
  var row=csvData.find(function(r){return(r['barcode']||'').trim().toUpperCase()===barcode;})||null;
  // เช็คซ้ำใน queue
  if(queue.find(function(q){return q.barcode.toUpperCase()===barcode;})){
    showToast('Barcode นี้อยู่ในรายการแล้ว','error');return;
  }
  showDoc(barcode, row);
}

function showDoc(barcode, row) {
  currentDoc = {
    barcode   : barcode,
    ref_no    : row ? row['ref_no']||'' : '',
    item_name : row ? row['item_name']||'' : '',
    from      : row ? row['customer_start_name']||'' : '',
    to        : row ? row['customer_destination_name']||'' : '',
    qty       : row ? row['total']||'' : '',
    not_found : !row
  };
  document.getElementById('rBarcode').textContent  = barcode;
  document.getElementById('rStatus').textContent   = row ? '' : '⚠️ ไม่พบในระบบ';
  document.getElementById('fRefNo').textContent    = currentDoc.ref_no    || '—';
  document.getElementById('fItemName').textContent = currentDoc.item_name || '—';
  document.getElementById('fFrom').textContent     = currentDoc.from      || '—';
  document.getElementById('fTo').textContent       = currentDoc.to        || '—';
  document.getElementById('fQty').textContent      = currentDoc.qty       || '—';
  document.getElementById('resultPanel').classList.add('visible');
}

function addToQueue() {
  if(!currentDoc)return;
  queue.push({
    barcode   : currentDoc.barcode,
    ref_no    : currentDoc.ref_no,
    item_name : currentDoc.item_name,
    from      : currentDoc.from,
    to        : currentDoc.to,
    qty       : currentDoc.qty,
    not_found : currentDoc.not_found
  });
  renderQueue();
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('manualInput').value='';
  showToast('เพิ่ม '+currentDoc.barcode+' แล้ว','success');
  currentDoc=null;
}

function removeFromQueue(i){queue.splice(i,1);renderQueue();}
function clearQueue(){if(queue.length&&confirm('ล้างรายการทั้งหมด?')){queue=[];renderQueue();}}

function renderQueue(){
  var n=queue.length;
  document.getElementById('queueCount').textContent=n;
  document.getElementById('submitBtn').disabled=n===0;
  document.getElementById('submitBtn').textContent=n?'✅ ยืนยันรับ '+n+' รายการ (with_delivery)':'✅ ยืนยันรับ 0 รายการ';
  document.getElementById('sendBtn').disabled=n===0;
  var list=document.getElementById('queueList');
  if(!n){list.innerHTML='<div class="empty">ยังไม่มีรายการ — สแกน barcode เพื่อเริ่มต้น</div>';return;}
  list.innerHTML=queue.map(function(item,i){
    return '<div class="queue-item">'+
      '<div class="queue-num">'+(i+1)+'</div>'+
      '<div class="queue-info">'+
        '<div class="queue-barcode">'+item.barcode+'</div>'+
        '<div class="queue-details">'+(item.ref_no||'—')+' · '+(item.from||'—')+' → '+(item.to||'—')+'</div>'+
      '</div>'+
      '<button class="queue-remove" onclick="removeFromQueue('+i+')">✕</button>'+
    '</div>';
  }).join('');
}

// ── Submit: with_delivery ────────────────────────────────
async function submitReceive() {
  if(!queue.length)return;
  var btn=document.getElementById('submitBtn');btn.disabled=true;
  btn.textContent='กำลังบันทึก...';
  try {
    var items=queue.map(function(item){
      return{barcode:item.barcode,status:'with_delivery',emp_id:session.empId,emp_name:session.empName,site:session.site,note:'รับจากขนส่ง'};
    });
    var res=await fetch(API_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'updateStatus',items:items})});
    var data=await res.json();
    if(data.status==='ok'){
      showToast('บันทึกรับ '+queue.length+' รายการเรียบร้อย','success');
      queue=[];renderQueue();loadPipeline();
    } else { showToast(data.message||'Error','error'); }
  } catch(err){showToast('เกิดข้อผิดพลาด: '+err.message,'error');}
  btn.disabled=false;
  btn.textContent='✅ ยืนยันรับ 0 รายการ (with_delivery)';
}

// ── Send to Warehouse: with_warehouse ────────────────────
async function sendToWarehouse() {
  if(!queue.length)return;
  if(!confirm('ส่ง '+queue.length+' รายการให้ทีมคลังพาเลท?'))return;
  var btn=document.getElementById('sendBtn');btn.disabled=true;
  btn.textContent='กำลังส่ง...';
  try {
    var items=queue.map(function(item){
      return{barcode:item.barcode,status:'with_warehouse',emp_id:session.empId,emp_name:session.empName,site:session.site,note:'ส่งให้คลังพาเลท'};
    });
    var res=await fetch(API_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'updateStatus',items:items})});
    var data=await res.json();
    if(data.status==='ok'){
      showToast('ส่งให้คลังพาเลท '+queue.length+' รายการแล้ว','success');
      queue=[];renderQueue();loadPipeline();
    } else { showToast(data.message||'Error','error'); }
  } catch(err){showToast('เกิดข้อผิดพลาด: '+err.message,'error');}
  btn.disabled=false;btn.textContent='📦 ส่งให้คลังพาเลท';
}

var toastTimer;
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'info')+' show';clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show');},3000);}
</script>
