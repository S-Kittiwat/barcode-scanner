<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DocScan — รับเอกสารจากจัดส่ง</title>
<script src="config.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#263348;--border:#334155;
  --accent:#38bdf8;--success:#34d399;--warn:#fbbf24;--danger:#f87171;
  --text:#f1f5f9;--muted:#94a3b8;
  --font:'IBM Plex Sans Thai',sans-serif;--mono:'IBM Plex Mono',monospace;
  --r:12px;--rs:8px;--sidebar:240px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;}
/* Sidebar */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;}
.sidebar-brand{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.brand-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-name{font-size:14px;font-weight:600;}.brand-sub{font-size:10px;color:var(--muted);}
.sidebar-user{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface2);}
.user-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{font-size:11px;color:var(--accent);margin-top:2px;}
.sidebar-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:4px;}
.nav-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 4px;font-weight:500;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);text-decoration:none;color:var(--muted);font-size:13px;font-weight:500;transition:background .15s,color .15s;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:rgba(56,189,248,.1);color:var(--accent);border:1px solid rgba(56,189,248,.2);}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border);}
.logout-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;color:var(--muted);font-size:13px;background:none;border:none;width:100%;font-family:var(--font);}
.logout-btn:hover{color:var(--danger);}
/* Page */
.page-wrap{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:600;}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:6px 14px;font-family:var(--font);font-size:12px;cursor:pointer;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}
/* Tabs */
.tab-wrap{padding:16px 24px 0;background:var(--surface);border-bottom:1px solid var(--border);}
.tab-bar{display:flex;gap:0;}
.tab-btn{padding:10px 20px;font-family:var(--font);font-size:13px;font-weight:500;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:7px;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-count{font-size:10px;font-family:var(--mono);font-weight:700;padding:1px 7px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);}
.tab-btn.active .tab-count{background:rgba(56,189,248,.15);border-color:rgba(56,189,248,.3);color:var(--accent);}
/* Content */
.content{padding:20px 24px;flex:1;}
/* Table */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.table-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.table-title{font-size:13px;font-weight:500;}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface2);padding:8px 14px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:11px 14px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.015);}
.mono{font-family:var(--mono);}
/* Buttons */
.btn-receive{background:var(--accent);border:none;color:#0f172a;border-radius:var(--rs);padding:6px 16px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;}
.btn-receive:hover{opacity:.85;}
/* Status badges */
.badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:500;white-space:nowrap;}
.badge-wait{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);color:var(--warn);}
.badge-done{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:var(--success);}
.badge-dispute{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--danger);}
.badge-lost{background:rgba(148,163,184,.12);border:1px solid rgba(148,163,184,.3);color:var(--muted);}
/* Empty */
.empty{text-align:center;padding:56px 24px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:10px;}
/* Spinner */
.spinner{width:16px;height:16px;border:2px solid rgba(56,189,248,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5">
        <rect x="3" y="4" width="3" height="16" rx="1"/><rect x="8" y="4" width="1.5" height="16" rx=".5"/>
        <rect x="11" y="4" width="3" height="16" rx="1"/><rect x="16" y="4" width="1.5" height="16" rx=".5"/>
        <rect x="19" y="4" width="2" height="16" rx="1"/>
      </svg>
    </div>
    <div><div class="brand-name">DocScan</div><div class="brand-sub">Pallet Tracking</div></div>
  </div>
  <div class="sidebar-user">
    <div class="user-name" id="sidebarName">—</div>
    <div class="user-role">🏭 ทีมคลังพาเลท</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">เมนู</div>
    <a class="nav-item" href="dashboard.html">📊 Dashboard</a>
    <a class="nav-item active" href="incoming.html">📥 รับเอกสาร</a>
    <a class="nav-item" href="batch.html">📦 Batch Scan ปกติ</a>
  </nav>
  <div class="sidebar-footer">
    <button class="logout-btn" onclick="DocScanAuth.clear();location.href='login.html';">↩ ออกจากระบบ</button>
  </div>
</aside>

<div class="page-wrap">

  <div class="topbar">
    <div>
      <div class="topbar-title">รับเอกสารจากจัดส่ง</div>
      <div class="topbar-sub" id="topbarSub">—</div>
    </div>
    <button class="refresh-btn" onclick="refreshAll()">↻ รีเฟรช</button>
  </div>

  <!-- Tabs -->
  <div class="tab-wrap">
    <div class="tab-bar">
      <button class="tab-btn active" id="tab1Btn" onclick="switchTab(1)">
        🚛 รายการระหว่างทาง
        <span class="tab-count" id="count1">—</span>
      </button>
      <button class="tab-btn" id="tab2Btn" onclick="switchTab(2)">
        ✅ รายการรับแล้ว
        <span class="tab-count" id="count2">—</span>
      </button>
      <button class="tab-btn" id="tab3Btn" onclick="switchTab(3)">
        ⚠️ รายการแก้ไข
        <span class="tab-count" id="count3">—</span>
      </button>
    </div>
  </div>

  <div class="content">

    <!-- Tab 1: รอรับ -->
    <div id="panel1">
      <div class="table-card">
        <div id="wrap1"><div class="empty"><span class="spinner"></span> กำลังโหลด...</div></div>
      </div>
    </div>

    <!-- Tab 2: รับแล้ว -->
    <div id="panel2" style="display:none;">
      <div class="table-card">
        <div id="wrap2"><div class="empty"><span class="spinner"></span> กำลังโหลด...</div></div>
      </div>
    </div>

    <!-- Tab 3: รายการแก้ไข -->
    <div id="panel3" style="display:none;">
      <div class="table-card">
        <div id="wrap3"><div class="empty"><span class="spinner"></span> กำลังโหลด...</div></div>
      </div>
    </div>

  </div>
</div>

<script>
var DocScanAuth=(function(){
  var KEY='docScanSession';
  function load(){try{var r=localStorage.getItem(KEY);if(!r)return null;var s=JSON.parse(r);return(s.empId&&s.site)?s:null;}catch(e){return null;}}
  function clear(){localStorage.removeItem(KEY);}
  function requireAuth(){var s=load();if(!s){location.href='login.html';return null;}return s;}
  return{load:load,clear:clear,requireAuth:requireAuth};
})();

var API_URL = DOCSCAN_CONFIG.API_URL;
var session;
var _loaded = {1:false, 2:false, 3:false};
var _activeTab = 1;

window.onload = function() {
  session = DocScanAuth.requireAuth();
  if (!session) return;
  document.getElementById('sidebarName').textContent = session.empName + ' (' + session.empId + ')';
  document.getElementById('topbarSub').textContent   = session.site;
  loadTab(1);
};

function switchTab(n) {
  _activeTab = n;
  [1,2,3].forEach(function(i) {
    document.getElementById('tab'+i+'Btn').classList.toggle('active', i===n);
    document.getElementById('panel'+i).style.display = i===n ? 'block' : 'none';
  });
  if (!_loaded[n]) loadTab(n);
}

function refreshAll() {
  _loaded = {1:false, 2:false, 3:false};
  loadTab(_activeTab);
}

function getSiteFilter() {
  return session.site_filter ? session.site_filter.join('|') : session.site;
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleString('th-TH',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return iso; }
}

// ── Tab 1: รอรับ (with_warehouse) ────────────────────────
function loadTab(n) {
  if (n===1) loadPending();
  else if (n===2) loadDone();
  else if (n===3) loadDisputed();
}

function loadPending() {
  _loaded[1] = true;
  var sf   = getSiteFilter();
  var wrap = document.getElementById('wrap1');
  wrap.innerHTML = '<div class="empty"><span class="spinner"></span> กำลังโหลด...</div>';

  fetch(API_URL + '?action=getIncoming&tab=pending&site_filter=' + encodeURIComponent(sf))
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var batches = data.batches || [];
      document.getElementById('count1').textContent = batches.length;
      // อัป done_count ที่ได้มาด้วย
      if (data.done_count !== undefined) document.getElementById('count2').textContent = data.done_count;

      if (!batches.length) {
        wrap.innerHTML = '<div class="empty"><div class="empty-icon">✅</div>ไม่มีรายการรอรับ</div>';
        return;
      }
      wrap.innerHTML = '<table><thead><tr>'+
        '<th>Batch No.</th><th>วันที่ส่ง</th><th>ส่งจาก</th>'+
        '<th style="text-align:right;">จำนวน</th><th style="text-align:center;">ดำเนินการ</th>'+
        '</tr></thead><tbody>'+
        batches.map(function(b) {
          return '<tr>'+
            '<td class="mono" style="color:var(--accent);">'+b.batch_id+'</td>'+
            '<td class="mono" style="font-size:11px;">'+fmtDate(b.sent_date||b.scan_date)+'</td>'+
            '<td style="font-size:11px;">'+(b.from_site||b.site||'—')+'</td>'+
            '<td class="mono" style="text-align:right;">'+b.barcode_count+' ใบ</td>'+
            '<td style="text-align:center;">'+
              '<button class="btn-receive" onclick="location.href=\'receive.html?batch_id='+encodeURIComponent(b.batch_id)+'\'">'+
              '📥 รับเอกสาร</button>'+
            '</td></tr>';
        }).join('')+'</tbody></table>';
    })
    .catch(function(err) {
      wrap.innerHTML = '<div class="empty" style="color:var(--danger);">โหลดไม่สำเร็จ: '+err.message+'</div>';
    });
}

// ── Tab 2: รับแล้ว ────────────────────────────────────────
function loadDone() {
  _loaded[2] = true;
  var sf   = getSiteFilter();
  var wrap = document.getElementById('wrap2');
  wrap.innerHTML = '<div class="empty"><span class="spinner"></span> กำลังโหลด...</div>';

  fetch(API_URL + '?action=getIncoming&tab=done&site_filter=' + encodeURIComponent(sf))
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var batches = data.batches || [];
      document.getElementById('count2').textContent = batches.length;

      if (!batches.length) {
        wrap.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>ยังไม่มีรายการที่รับแล้ว</div>';
        return;
      }
      wrap.innerHTML = '<table><thead><tr>'+
        '<th>Batch No.</th><th>วันที่ส่ง</th><th>ส่งจาก</th>'+
        '<th>รับโดย</th><th>วันที่รับ</th>'+
        '<th style="text-align:right;">จำนวน</th><th style="text-align:center;">สถานะ</th>'+
        '</tr></thead><tbody>'+
        batches.map(function(b) {
          var statusBadge = b.status === 'scanned'
            ? '<span class="badge badge-done">✅ Scan แล้ว</span>'
            : '<span class="badge badge-done">✅ รายการรับแล้ว</span>';
          return '<tr>'+
            '<td class="mono" style="color:var(--success);">'+b.batch_id+'</td>'+
            '<td class="mono" style="font-size:11px;">'+fmtDate(b.sent_date||b.scan_date)+'</td>'+
            '<td style="font-size:11px;">'+(b.from_site||b.site||'—')+'</td>'+
            '<td style="font-size:11px;">'+(b.received_by||'—')+'</td>'+
            '<td class="mono" style="font-size:11px;">'+fmtDate(b.received_at)+'</td>'+
            '<td class="mono" style="text-align:right;">'+b.barcode_count+' ใบ</td>'+
            '<td style="text-align:center;">'+statusBadge+'</td>'+
          '</tr>';
        }).join('')+'</tbody></table>';
    })
    .catch(function(err) {
      wrap.innerHTML = '<div class="empty" style="color:var(--danger);">โหลดไม่สำเร็จ: '+err.message+'</div>';
    });
}

// ── Tab 3: รายการแก้ไข (disputed/lost_document) ──────────
function loadDisputed() {
  _loaded[3] = true;
  var sf   = getSiteFilter();
  var wrap = document.getElementById('wrap3');
  wrap.innerHTML = '<div class="empty"><span class="spinner"></span> กำลังโหลด...</div>';

  fetch(API_URL + '?action=getBatches&status_filter=disputed&site_filter=' + encodeURIComponent(sf))
    .then(function(r){ return r.json(); })
    .then(function(data) {
      // กรองเฉพาะ PEND batches ที่ dest ตรงกับ site คลัง
      var batches = (data.batches||[]).filter(function(b) {
        return b.batch_id && b.batch_id.indexOf('-PEND') !== -1;
      });
      document.getElementById('count3').textContent = batches.length;

      if (!batches.length) {
        wrap.innerHTML = '<div class="empty"><div class="empty-icon">🎉</div>ไม่มีรายการที่ต้องแก้ไข</div>';
        return;
      }
      wrap.innerHTML = '<table><thead><tr>'+
        '<th>Batch PEND</th><th>Batch ต้นทาง</th><th>วันที่แจ้ง</th>'+
        '<th>ส่งจาก</th><th style="text-align:right;">จำนวน</th>'+
        '<th style="text-align:center;">สถานะ</th>'+
        '</tr></thead><tbody>'+
        batches.map(function(b) {
          var originalBatch = b.batch_id.replace('-PEND','');
          var isLost = b.status === 'lost_document';
          var badge  = isLost
            ? '<span class="badge badge-lost">🔴 เอกสารหาย</span>'
            : '<span class="badge badge-dispute">⚠️ รอจัดส่ง</span>';
          return '<tr>'+
            '<td class="mono" style="color:var(--danger);">'+b.batch_id+'</td>'+
            '<td class="mono" style="font-size:11px;color:var(--muted);">'+originalBatch+'</td>'+
            '<td class="mono" style="font-size:11px;">'+fmtDate(b.scan_date)+'</td>'+
            '<td style="font-size:11px;">'+(b.site||'—')+'</td>'+
            '<td class="mono" style="text-align:right;">'+b.barcode_count+' ใบ</td>'+
            '<td style="text-align:center;">'+badge+'</td>'+
          '</tr>';
        }).join('')+'</tbody></table>';
    })
    .catch(function(err) {
      wrap.innerHTML = '<div class="empty" style="color:var(--danger);">โหลดไม่สำเร็จ: '+err.message+'</div>';
    });
}
</script>
</body>
</html>
